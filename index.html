<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/app-icon/icon-40.png" />
    <link rel="apple-touch-icon" href="/app-icon/icon-180.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/app-icon/icon-180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/app-icon/icon-152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/app-icon/icon-120.png">
    <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent + viewport-fit=cover = true edge-to-edge in the installed
         app (content behind the status bar, env() insets populated). Its cold-start
         stale-viewport bug is handled in JS (src/utils/appHeight.ts) — see
         issues/002-ios-app-frame-short.md, "Fresh analysis". -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Skovens Skatte" />
    <meta name="application-name" content="Skovens Skatte" />
    <meta name="msapplication-TileColor" content="#2f4a32" />
    <!-- Static fallback per OS scheme; ThemeContext rewrites both metas to the resolved theme after hydration -->
    <meta name="theme-color" content="#f4efe3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c261b" media="(prefers-color-scheme: dark)" />
    <title>Skovens Skatte</title>
    <!-- Apply the resolved theme before first paint so a manual override doesn't
         flash the OS-scheme palette on reload (ThemeContext takes over after mount) -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('ss-theme');
          var dark =
            pref === 'dark' ||
            (pref !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
          if (pref === 'dark' || pref === 'light') {
            document.querySelectorAll('meta[name="theme-color"]').forEach(function (meta) {
              meta.setAttribute('content', dark ? '#1c261b' : '#f4efe3');
            });
          }
        } catch (e) {
          /* no storage access — fall back to the prefers-color-scheme metas */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
